<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TotalizadorDeVentas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TotalizadorDeVentas</h1>
    <form id="ventas-form">
        <label> Cantidad: </label>
        <input type="number" id="cantidad" />
        <br><br>
        <label> Precio Unitario: </label>
        <input type="number" id="precio" />
        <br><br>
        <label> Codigo de Estado: </label>
        <select id="estado">
            <option value="CA" selected>CA - California</option>
            <option value="AL">AL - Alabama</option>
            <option value="NV">NV - Nevada</option>
            <option value="UT">UT - Utah</option>
            <option value="TX">TX - Texas</option>
        </select>
        <br><br>

        <label> Categoría de Producto: </label>
        <select id="categoria">
            <option value="Alimentos">Alimentos</option>
            <option value="Bebidas alcoholicas">Bebidas alcoholicas</option>
            <option value="Material de escritorio">Material de escritorio</option>
            <option value="Muebles">Muebles</option>
            <option value="Electronicos">Electronicos</option>
            <option value="Vestimenta">Vestimenta</option>
            <option value="Varios" selected>Varios</option> </select>
        <br><br>

        <label> Peso volumétrico por unidad: </label>
        <input type="number" id="peso" />
        <br><br>
        
        <label> Tipo de Cliente: </label>
        <select id="cliente">
            <option value="Normal"selected>Normal</option>
            <option value="Recurrente">Recurrente</option>
            <option value="Antiguo Recurrente">Antiguo Recurrente</option>
            <option value="Especial">Especial</option>
        </select>
        <br><br>

        <button type="button" id="btn-j1">Totalizar</button>
    </form>
    
    <div id="resultado"></div>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
